<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffing Portal - HAVEN</title>
    <link rel="stylesheet" href="staffing.css">
</head>
<body>
    <div class="header-gradient">
        <div class="header-title">Staffing Portal</div>
        <button class="logout-btn" onclick="window.location.href='../login.html'">Logout</button>
    </div>

    <div class="sidebar">
        <div class="sidebar-logo">
            <span style="font-weight: bold; font-size: 1.2rem;">HAVEN</span>
        </div>
        <div class="sidebar-menu">
            <a href="manager_dashboard.html" class="sidebar-item"><span>Dashboard</span></a>
            <a href="../profile.html" class="sidebar-item"><span>User Profile</span></a>
            <a href="staffing.html" class="sidebar-item active"><span>Staffing</span></a>
            <a href="../messages.html" class="sidebar-item"><span>Messages</span></a>
            <a href="settings.html" class="sidebar-item"><span>Settings</span></a>
        </div>
    </div>

    <div class="main-content">
        <div class="action-buttons">
            <button class="assign-btn" onclick="assignStaffToEvent()">Assign Selected</button>
            <button class="clear-btn" onclick="clearSelections()">Clear Selections</button>
        </div>

        <div class="assignment-wrapper">
            <div class="section events-section">
                <h2>Events</h2>
                <div class="events-list" id="eventsList"></div>
            </div>

            <div class="section staff-section">
                <h2>Available Staff</h2>
                <select id="staffRoleFilter" class="role-filter" onchange="applyRoleFilter()">
                    <option value="">All Roles</option>
                </select>
                <div class="staff-list" id="staffList"></div>
            </div>

            <div class="section assignments-section">
                <h2>Event Assignments</h2>
                <div class="assignments-container" id="assignmentsContainer"></div>
            </div>
        </div>
    </div>

    <script src="staffing.js"></script>
</body>
</html>
