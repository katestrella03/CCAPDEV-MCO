<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - HAVEN</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="header-gradient">
        <div class="header-title">Admin Dashboard</div>
        <button class="logout-btn" onclick="window.location.href='../login.html'">Logout</button>
    </div>

    <div class="sidebar">
        <div class="sidebar-logo">
            <span style="font-weight: bold; font-size: 1.2rem;">HAVEN</span>
        </div>
        <div class="sidebar-menu">
            <a href="admin_dashboard.html" class="sidebar-item active"><span>Dashboard</span></a>
            <a href="profile.html" class="sidebar-item"><span>Profile</span></a>
            <a href="messages.html" class="sidebar-item"><span>Messages</span></a>
        </div>
    </div>

    <div class="main-content">
        <div class="form-container">
            <h2>Create New Account</h2>
            <form id="createAccountForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                </div>

                <div class="form-group">
                    <label for="role">User Role</label>
                    <select id="role" required>
                        <option value="" disabled selected>Select a role</option>
                        <option value="admin">Admin</option>
                        <option value="manager">Manager</option>
                        <option value="staff">Staff</option>
                    </select>
                </div>

                <button type="submit" class="create-btn">Create Account</button>
            </form>
        </div>
    </div>
</body>
</html>
